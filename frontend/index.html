<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>🍲 Recipe App</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  margin: 0;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

h1 {
  text-align: center;
}

.controls input, .controls select {
  padding: 10px;
  margin: 5px;
  width: 30%;
}

.add-box input {
  width: 23%;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.add { background: #28a745; color: white; }
.edit { background: #ff9800; color: white; }
.delete { background: #dc3545; color: white; }

.card {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 8px;
  margin-top: 10px;
}
.category {
  font-size: 18px;   /* 👈 това прави текста по-голям */
  font-weight: bold; /* 👈 удебелен */
  color: #444;
  margin-top: 5px;
  margin-bottom: 5px;
}
</style>
</head>

<body>

<div class="container">

<h1>🍲 Recipe App</h1>

<!-- ADD -->
<div class="add-box">
  <input id="title" placeholder="Заглавие">
  <input id="content" placeholder="Описание">
  <input id="image" placeholder="Снимка (URL)">

  <select id="category">
    <option>Супи</option>
    <option>Предястия</option>
    <option>Основни</option>
    <option>Десерти</option>
    <option>Тестени</option>
    <option>Салати</option>
  </select>

  <button class="add" onclick="addOrUpdate()">Добави</button>
</div>

<!-- SEARCH + FILTER -->
<div class="controls">
  <input id="search" placeholder="🔍 Търси..." oninput="loadRecipes()">

  <select id="filter" onchange="loadRecipes()">
    <option value="">Всички</option>
    <option>Супи</option>
    <option>Предястия</option>
    <option>Основни</option>
    <option>Десерти</option>
    <option>Тестени</option>
    <option>Салати</option>
  </select>
</div>

<!-- LIST -->
<div id="list"></div>

</div>

<script>

const API = "https://recipe-app-3jmt.onrender.com";

let editId = null;

// 📥 LOAD
async function loadRecipes() {
  const res = await fetch(API + "/recipes");
  let data = await res.json();

  const search = document.getElementById("search").value.toLowerCase();
  const filter = document.getElementById("filter").value;

  data = data.filter(r =>
    r.title.toLowerCase().includes(search) &&
    (filter === "" || r.category === filter)
  );

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(r => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${r.title}</h3>
      <div class="category">${r.category || ""}</div>
      <p>${r.content}</p>
      ${r.image ? `<img src="${r.image}">` : ""}

      <br>
      <button class="edit" onclick="editRecipe('${r._id}','${r.title}','${r.content}','${r.image || ""}','${r.category || ""}')">✏️</button>
      <button class="delete" onclick="deleteRecipe('${r._id}')">❌</button>
    `;

    list.appendChild(div);
  });
}

// ➕ ADD / UPDATE
async function addOrUpdate() {
  const title = document.getElementById("title").value;
  const content = document.getElementById("content").value;
  const image = document.getElementById("image").value;
  const category = document.getElementById("category").value;

  if (!title || !content) return alert("Попълни полетата!");

  if (editId) {
    await fetch(API + "/recipes/" + editId, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, content, image, category })
    });
    editId = null;
  } else {
    await fetch(API + "/recipes", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, content, image, category })
    });
  }

  // 🧹 clear fields
  document.getElementById("title").value = "";
document.getElementById("content").value = "";
document.getElementById("image").value = "";

  loadRecipes();
}

// ✏️ EDIT
function editRecipe(id, title, content, image, category) {
  document.getElementById("title").value = title;
  document.getElementById("content").value = content;
  document.getElementById("image").value = image;
  document.getElementById("category").value = category;

  editId = id;
}

// ❌ DELETE
async function deleteRecipe(id) {
  await fetch(API + "/recipes/" + id, {
    method: "DELETE"
  });

  loadRecipes();
}

loadRecipes();

</script>

</body>
</html>

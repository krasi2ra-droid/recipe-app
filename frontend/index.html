<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<title>🍲 Recipe App</title>

<style>
body {
  font-family: Arial;
  background: #eef2f7;
  margin: 0;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.nav {
  text-align: center;
  margin-bottom: 20px;
}

.nav a {
  margin: 0 10px;
  text-decoration: none;
  font-weight: bold;
}

.card {
  background: white;
  padding: 15px;
  margin: 15px 0;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.card img {
  width: 100%;
  border-radius: 8px;
  margin-top: 10px;
}

.category {
  font-size: 18px;
  font-weight: bold;
  color: #555;
}
</style>
</head>

<body>

<div class="container">

<h1>🍲 Recipe App</h1>

<div class="nav">
  <a href="/">Всички</a>
  <a href="/supi">Супи</a>
  <a href="/predqstiq">Предястия</a>
  <a href="/osnovni">Основни</a>
  <a href="/deserti">Десерти</a>
  <a href="/testeni">Тестени</a>
  <a href="/salati">Салати</a>
</div>

<div>
  <input id="title" placeholder="Заглавие">
  <input id="content" placeholder="Описание">
  <input id="image" placeholder="Снимка URL">
  <input id="category" placeholder="Категория">
  <button onclick="addOrUpdate()">Добави</button>
</div>

<br>

<input id="search" placeholder="🔍 Търси..." oninput="loadRecipes()">

<div id="list"></div>

</div>

<script src="app.js"></script>

</body>
</html>
